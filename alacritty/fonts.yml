# Font configuration
font:
  normal:
    family: "JetBrainsMono Nerd Font"
    # family: "Source Code Pro"
    # family: "Droid Sans Mono"
    style: Medium

  # Bold font face
  bold:
    family: "JetBrainsMono Nerd Font"
    # family: "Source Code Pro"
    # family: "Droid Sans Mono"
    style: Bold

  # Italic font face
  italic:
    family: "JetBrainsMono Nerd Font"
    # family: "Source Code Pro"
    # family: "Droid Sans Mono"
    style: Italic

  # Bold italic font face
  bold_italic:
    family: "JetBrainsMono Nerd Font"
    # family: "Source Code Pro"
    # family: "Droid Sans Mono"
    style: Bold Italic

  # Point size
  size: 10

# cursor:
#   text: '#191919'
#   cursor: '#d8dee9'

# vi_mode_cursor:
#   text: CellBackground
#   cursor: CellForeground

  # Offset
  offset:
   x: 0
   y: 0

